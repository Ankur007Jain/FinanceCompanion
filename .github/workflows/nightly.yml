name: Nightly Stock Analysis

on:
  schedule:
    # 4 checks/day, Mon-Fri, ~5h apart — 4am UTC is the primary run (11 PM CT); the
    # other three are free no-op retries when everything's already analyzed (the
    # split job skips the whole analyze matrix, see has_work below) and a real,
    # small retry of just the gap when a batch died mid-run (e.g. the shared Claude
    # Code subscription's usage window was exhausted — retrying ~5h later lines up
    # with that window resetting, rather than waiting a full day for the next run).
    - cron: "0 4,9,14,19 * * 1-5"
  workflow_dispatch:          # manual trigger from GitHub UI
    inputs:
      tickers:
        description: "Comma-separated tickers to test (e.g. NVDA,MSFT) — leave empty for the full watchlist"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # ── Job 1: compute batches of 5, skip already-analyzed tickers ──────────────
  split:
    name: "Split tickers into batches"
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      batches: ${{ steps.compute.outputs.batches }}
      has_work: ${{ steps.compute.outputs.has_work }}
    steps:
      - name: Compute ticker batches
        id: compute
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          TICKERS_OVERRIDE: ${{ github.event.inputs.tickers }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os

          backend = os.environ['BACKEND_URL']
          secret  = os.environ['ADMIN_SECRET']
          override = os.environ.get('TICKERS_OVERRIDE', '').strip()

          def fetch(url):
              r = subprocess.run(['curl', '-sf', url], capture_output=True, text=True, timeout=15)
              try:
                  return json.loads(r.stdout)
              except Exception:
                  return {}

          if override:
              all_tickers = [t.strip().upper() for t in override.split(',') if t.strip()]
              print(f"Manual override — testing only: {all_tickers}")
          else:
              all_tickers = fetch(f"{backend}/jobs/admin/tickers?x_admin_secret={secret}").get('tickers', [])
              if not all_tickers:
                  all_tickers = ['NFLX', 'MRVL', 'SOXQ', 'SOXL', 'MVLL']

          analyzed = set(fetch(f"{backend}/jobs/admin/analyzed-today?x_admin_secret={secret}").get('analyzed', []))
          remaining = [t for t in all_tickers if t not in analyzed]

          print(f"Total watchlist : {len(all_tickers)} tickers")
          print(f"Already done    : {len(analyzed)} — {sorted(analyzed & set(all_tickers))}")
          print(f"To analyze      : {len(remaining)} — {remaining}")

          BATCH = 5
          if remaining:
              batches  = [','.join(remaining[i:i+BATCH]) for i in range(0, len(remaining), BATCH)]
              has_work = 'true'
          else:
              batches  = ['__SKIP__']
              has_work = 'false'

          print(f"Batches ({len(batches)}) : {batches}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"batches={json.dumps(batches)}\n")
              f.write(f"has_work={has_work}\n")
          PYEOF

  # ── Job 2: one parallel job per batch of 5 ──────────────────────────────────
  analyze:
    name: "Analyze [${{ matrix.batch }}]"
    needs: split
    if: needs.split.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      matrix:
        batch: ${{ fromJson(needs.split.outputs.batches) }}
      fail-fast: false   # one batch failing doesn't cancel the others
      max-parallel: 6    # cap concurrent Claude sessions — all batches share one
                          # Claude Code subscription usage pool, so unlimited
                          # concurrency (previously ~18 at once) means a spending-cap
                          # trip catches most of the run mid-flight instead of a few

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data deps
        run: pip install yfinance pandas pandas-ta finnhub-python requests google-genai

      - name: Analyze batch
        uses: anthropics/claude-code-action@beta
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          JOB_SECRET: ${{ secrets.JOB_SECRET }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        with:
          mode: agent
          model: claude-sonnet-5
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Edit,Read,Write,Glob,Grep,LS"
          direct_prompt: |
            You are FinanceCompanion's nightly stock analysis agent. Today is $(date +%Y-%m-%d).

            ## Your assigned tickers (analyze ALL of these — no skipping)

            ${{ matrix.batch }}

            These have already been filtered against today's analyzed list — work through every
            ticker in the list above. If a POST returns 409 (already exists), move on.

            ## Step 1 — Fetch market data for each ticker

            Run these two scripts per ticker (dependencies already installed in the "Install data deps" step):
            ```bash
            python3 scripts/nightly_fetch.py TICKER
            ```
            This prints the analysis summary JSON and writes /tmp/summary_TICKER.json + /tmp/raw_TICKER.json.

            ## Step 1b — Save raw snapshot to backend

            ```bash
            python3 scripts/nightly_ingest_snapshot.py TICKER
            ```
            POSTs the raw snapshot from Step 1 to the backend (BACKEND_URL/JOB_SECRET are in the environment).

            ## Step 1c — Fetch past lessons (stock memory)

            Run ONCE for the whole batch (comma-separated tickers, no spaces):
            ```bash
            python3 scripts/nightly_fetch_memory.py TICKER1,TICKER2,...
            ```
            Writes /tmp/memory_TICKER.txt for each ticker that has accumulated lessons from past
            analyses and reports (e.g. "Past mistakes to avoid: stale analyst targets as validation").
            Tickers without a memory file are fine — just skip that context for them.

            ## Step 2 — Compute signal convergence score for each ticker

            Score 10 independent signals (true/false each):
            - oversold_rsi: rsi < 50
            - near_52w_low: range_pct < 30
            - analyst_upside_15pct: upside_pct >= 15
            - no_binary_risk: earnings_date is null OR more than 7 days from today
            - positive_fcf: true if free_cashflow > 0 (real free cash flow — false if null, never assume positive)
            - institutional_backing: true if inst_ownership_pct >= 0.50 (real institutional ownership data — false if null, don't default true for large caps)
            - price_stabilizing: price >= ma50 (or ma50 is null)
            - near_support: price <= support_20d * 1.03 (within 3% of 20-day support floor)
            - sector_outperforming: relative_strength_1d > 0 (stock outperforming its sector ETF today)
            - sp500_tailwind: sp500_day_chg > 0 (market rising — macro tailwind)

            convergence_score = count of true signals (0–10)
            CONVICTION FLOOR: convergence_score < 5 → verdict MUST be WATCH.

            ## Step 3a — Your verdict: Claude Sonnet 4.6 (Verdict A)

            **Check:** 52-week range position · price vs MA50/MA200 · RSI · analyst consensus ·
            news sentiment · earnings proximity (within 5 days → is_important_day=true) ·
            price vs support/resistance levels (use S/R to set precise entry_target and stop_loss)

            **Market & sector context** (from summary JSON — factor this into your reasoning):
            - S&P 500 today: sp500_day_chg% → positive = macro tailwind, negative = headwind
            - Sector ETF (sector_etf) today: sector_day_chg% → sector momentum
            - Relative strength vs sector: relative_strength_1d% → positive = stock outperforming sector
            - Finnhub cross-check: fh_price and fh_analyst (if conflicts in data_conflicts field, be more conservative — this field can also carry a target-sanity warning from a prior night, e.g. a stop_loss that didn't cohere with the verdict; treat either kind the same way)
            - Sector-type rules:
              · Utilities / Real Estate: rate-sensitive — factor in macro rates more than RSI
              · Semiconductors (SOXX): high beta, amplify the sector move, tighten stop_loss
              · Consumer Defensive: lower conviction needed for HOLD; rarely a BUY catalyst
              · Leveraged ETFs (SOXL, MVLL, 3X/2X/L): max hold 1–3 days, never hold through earnings, tight exit_target

            **Long-term trend & fundamentals** (from summary JSON — weigh this, don't mechanically gate on it):
            - 1yr return: stock_52w_change% vs S&P's sp500_52w_change% — badly lagging the market over
              a full year is a different story than a recent dip; treat a short-term oversold reading
              with more skepticism when the 1yr trend is also weak.
            - 5yr return: stock_5y_change% vs S&P's sp500_5y_change% — a stock flat or negative over
              5 years while the market compounded is a much stronger signal of structural decline than
              a 1yr number alone. If both 1yr and 5yr badly lag, say explicitly in your reasoning whether
              this looks like a temporary dip in a quality business or a structural decliner — don't
              default to "oversold = reversal" without addressing this.
            - Valuation: pe_trailing / pe_forward — a low P/E can mean cheap for a reason; sanity-check
              it against revenue_growth/earnings_growth/profit_margin before treating it as bullish.
            - Quality: revenue_growth, earnings_growth, profit_margin, return_on_equity — weak or
              negative values are a structural concern, not noise, especially alongside a technical bounce.
            - Balance sheet: debt_to_equity, free_cashflow — high debt paired with negative free cash flow
              means the business may not survive a prolonged downturn; weigh this heavily against any
              "it's cheap" narrative.
            - Positioning: short_float_pct/short_ratio (elevated short interest = smart-money skepticism,
              but also squeeze risk) and inst_ownership_pct/insider_ownership_pct (meaningful ownership =
              real conviction, not just retail interest).
            - Any of these fields can be null (small caps, recent IPOs, data gaps) — treat null as
              "unknown," never as zero or as a green light. Lower conviction_score when long-term trend
              and fundamentals contradict a purely technical setup; this is a judgment call, not a hard rule.

            **Past lessons (stock memory):** if /tmp/memory_TICKER.txt exists (from Step 1c), read it
            before deciding. It contains lessons extracted from this ticker's own past analyses and
            reports — verdict flips that proved wrong, targets that were stale anchors, patterns that
            didn't hold. Do not repeat a mistake the memory explicitly warns about; if you disagree
            with a lesson, say why in your reasoning rather than silently ignoring it.

            **Never invent a number.** Every price, percentage, or date you cite in reasoning/bull_case/
            bear_case/thesis_invalidation must come from the summary JSON, the deep fields above, or
            memory — not from general knowledge or a plausible-sounding guess. If you don't have a figure,
            say so explicitly rather than stating an invented one as fact.

            **Quality rule:** weak or conflicting signals → WATCH. Wrong advice is worse than no advice.

            **Required for every ticker:**
            - entry_quality: GREAT | FAIR | WAIT
            - hold_and_forget_rating: HOLD_AND_FORGET | CHECK_MONTHLY | WATCH_CLOSELY
            - position_size_pct: e.g. "5-8%" — scale with conviction, inverse of risk
            - Three scenarios — bull + base + bear probabilities MUST sum to 100

            Produce one JSON object per ticker and save it to /tmp/verdict_a_TICKER.json:
            ```json
            {
              "verdict": "BUY|HOLD|SELL|WATCH",
              "entry_target": <float or null>,
              "exit_target": <float or null>,
              "stop_loss": <float or null>,
              "hold_period": "<'3-5 days' / '2-4 weeks' / '1-3 months' — null if WATCH/SELL>",
              "reasoning": "<10-15 lines>",
              "conviction_score": <0-100>,
              "risk_level": "LOW|MED|HIGH",
              "confidence": "High|Medium|Low",
              "bull_case": "<one sentence>",
              "bear_case": "<one sentence>",
              "thesis_invalidation": "<one sentence>",
              "news_summary": "<3-4 sentences>",
              "ripple_analysis": "<2nd/3rd order effects>",
              "is_important_day": <true|false>,
              "importance_reason": "<reason or empty string>",
              "entry_quality": "GREAT|FAIR|WAIT",
              "hold_and_forget_rating": "HOLD_AND_FORGET|CHECK_MONTHLY|WATCH_CLOSELY",
              "position_size_pct": "<e.g. '5-8%'>",
              "scenario_bull": "<one sentence>",
              "scenario_bull_pct": <float>,
              "scenario_bull_prob": <0-100>,
              "scenario_base": "<one sentence>",
              "scenario_base_pct": <float>,
              "scenario_base_prob": <0-100>,
              "scenario_bear": "<one sentence>",
              "scenario_bear_pct": <negative float>,
              "scenario_bear_prob": <0-100>,
              "dont_panic_note": "<address >15% drop from prior BUY; otherwise empty string>",
              "signal_convergence_score": <0-10>,
              "convergence_details": "{\"oversold_rsi\":true/false,\"near_52w_low\":true/false,\"analyst_upside_15pct\":true/false,\"no_binary_risk\":true/false,\"positive_fcf\":true/false,\"institutional_backing\":true/false,\"price_stabilizing\":true/false,\"near_support\":true/false,\"sector_outperforming\":true/false,\"sp500_tailwind\":true/false}"
            }
            ```
            Write the JSON to disk with a bash command, e.g.:
            ```bash
            cat > /tmp/verdict_a_TICKER.json << 'JSONEOF'
            {...the JSON you produced above...}
            JSONEOF
            ```

            ## Step 3b — Gemini verdict (Verdict B)

            Run this script per ticker (GEMINI_API_KEY is already in the environment):
            ```bash
            python3 scripts/nightly_verdict_b.py TICKER
            ```
            Reads /tmp/summary_TICKER.json (from Step 1) and writes /tmp/verdict_b_TICKER.json.
            Writes {"verdict": null} if Gemini is unavailable — treat that as "verdict_b: null" in Step 3c/4.

            ## Step 3c — Judge: reconcile both verdicts

            Read /tmp/verdict_a_TICKER.json and /tmp/verdict_b_TICKER.json and apply this agreement table
            to produce final_verdict, verdict_agreement (true/false/null), and split_reason:

            | Verdict A  | Verdict B  | Final verdict | verdict_agreement |
            |------------|------------|---------------|-------------------|
            | X          | X (same)   | X             | true              |
            | BUY        | HOLD       | WATCH         | false             |
            | BUY        | SELL       | WATCH         | false             |
            | BUY        | WATCH      | WATCH         | false             |
            | HOLD       | SELL       | WATCH         | false             |
            | HOLD       | WATCH      | WATCH         | false             |
            | SELL       | WATCH      | SELL          | false             |
            | WATCH      | SELL       | SELL          | false             |
            | (any)      | null       | verdict_a     | null (Gemini N/A) |

            When verdict_agreement=false, write split_reason as one sentence explaining the key disagreement
            (e.g. "Claude sees oversold RSI as a buy signal; Gemini flags near-term earnings risk as bearish").

            **Even when verdict_agreement=true**, compare verdict_a's and verdict_b's conviction_score. If
            they differ by 30+ points, still write split_reason noting the confidence gap (e.g. "Both models
            say BUY, but confidence diverges: Claude 75/100 vs Gemini 40/100 — Gemini sees more risk in the
            setup"). Agreeing on the verdict isn't the same as agreeing on how strongly to hold it — surface
            the gap rather than silently averaging or picking one.

            Store final_verdict, verdict_a, verdict_b, verdict_agreement, split_reason in working memory
            for Step 4. The `verdict` field in Step 4 must be final_verdict (the judge's output).

            ## Step 4 — POST each result to the backend

            ```bash
            curl -s -X POST "${{ secrets.BACKEND_URL }}/jobs/ingest-analysis?x_job_secret=${{ secrets.JOB_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '<full JSON: ticker, analysis_date, price fields + all verdict fields>'
            ```

            Price field mapping: price→current_price, change_pct→price_change_pct,
            hi52→week52_high, lo52→week52_low, range_pct→week52_position_pct,
            ma50→ma50, ma200→ma200, analyst→analyst_consensus, analyst_count→analyst_count,
            upside_pct→analyst_upside_pct, target_mean→target_price_mean,
            target_high→target_price_high, target_low→target_price_low,
            support_20d→support_20d, resistance_20d→resistance_20d,
            pivot→pivot_point, piv_r1→pivot_r1, piv_s1→pivot_s1,
            sector→sector, industry→industry,
            sp500_day_chg→sp500_day_chg, sector_etf→sector_etf,
            sector_day_chg→sector_day_chg, relative_strength_1d→relative_strength_1d,
            sp500_52w_change→sp500_52w_change, stock_52w_change→stock_52w_change,
            sp500_5y_change→sp500_5y_change, stock_5y_change→stock_5y_change,
            fh_price→fh_price, fh_analyst→fh_analyst_consensus,
            data_conflicts→data_conflicts (include if not null, else omit).

            Fundamentals field mapping (from the same summary JSON — pass through as-is, null if missing):
            pe_trailing→pe_trailing, pe_forward→pe_forward, revenue_growth→revenue_growth,
            earnings_growth→earnings_growth, profit_margin→profit_margin, debt_to_equity→debt_to_equity,
            free_cashflow→free_cashflow, return_on_equity→return_on_equity, beta→beta,
            short_float_pct→short_float_pct, short_ratio→short_ratio,
            inst_ownership_pct→inst_ownership_pct, insider_ownership_pct→insider_ownership_pct,
            dividend_yield→dividend_yield, market_cap→market_cap.

            Include ALL verdict fields: stop_loss, hold_period, conviction_score, risk_level,
            confidence, bull_case, bear_case, thesis_invalidation, entry_quality,
            hold_and_forget_rating, position_size_pct, all scenario_* fields, dont_panic_note,
            signal_convergence_score, convergence_details.

            Include dual-agent fields from Step 3c: verdict_a, verdict_b, verdict_agreement,
            split_reason. Use null for verdict_b/verdict_agreement/split_reason if Gemini was unavailable.
            The `verdict` field MUST be final_verdict from Step 3c (judge output), not raw verdict_a.

            Include gemini_tokens_input and gemini_tokens_output from verdict_b's usage metadata
            (Step 3b — these are Gemini's own real token counts, not an estimate). Omit both if
            Gemini was unavailable or didn't return usage_metadata. Do not compute or invent a
            dollar cost — the backend derives that from these raw counts.

            Also include earnings_date (the raw string from yfinance, e.g. "2026-07-15") if available, else omit it.

            ## Step 5 — Print summary

            ```
            === Batch complete — <date> ===
            TICKER   VERDICT  VERDICT_A  VERDICT_B  AGREEMENT  PRICE  CHG%  RSI  CONV  SP500  SECTOR  REL_STR  CONFLICTS
            ✅ = both models agree  ⚠️ = split verdict  — = Gemini unavailable  ⚡ = data conflict flagged
            ```

            On any per-ticker error, log it and continue — never abort the batch.
