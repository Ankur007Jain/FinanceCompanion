name: Nightly Stock Analysis

on:
  schedule:
    - cron: "0 4 * * 1-5"   # 11 PM CT Mon–Fri (4 AM UTC)
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write
  id-token: write

jobs:
  nightly-analysis:
    name: "Nightly Stock Analysis Agent"
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data deps
        run: pip install yfinance pandas pandas-ta finnhub-python requests

      - name: Run nightly analysis agent
        uses: anthropics/claude-code-action@beta
        with:
          mode: agent
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Edit,Read,Write,Glob,Grep,LS"
          direct_prompt: |
            You are FinanceCompanion's nightly stock analysis agent. Today is $(date +%Y-%m-%d).

            ## Step 1 — Get tickers (skip already-analyzed ones)

            First, get all watchlisted tickers:
            ```bash
            curl -sf "${{ secrets.BACKEND_URL }}/jobs/admin/tickers?x_admin_secret=${{ secrets.ADMIN_SECRET }}" || echo '{"tickers":[]}'
            ```
            If the result is empty or the backend is unreachable, use the seed universe: NFLX, MRVL, SOXQ, SOXL, MVLL

            Then get tickers already analyzed today (skip these — data already saved, no need to re-fetch):
            ```bash
            curl -sf "${{ secrets.BACKEND_URL }}/jobs/admin/analyzed-today?x_admin_secret=${{ secrets.ADMIN_SECRET }}" || echo '{"analyzed":[]}'
            ```
            Remove any ticker in `analyzed` from your work list before proceeding. Log which tickers you are skipping.

            ## Step 2 — Fetch market data for each ticker

            Run this Python script once per ticker (substitute TICKER):
            ```bash
            python3 << 'EOF'
            import yfinance as yf, json, sys
            ticker = "TICKER"
            t = yf.Ticker(ticker)
            info = t.info
            hist = t.history(period="1y")
            fi = t.fast_info

            price = fi.last_price or info.get("currentPrice", 0) or 0
            prev  = fi.previous_close or info.get("previousClose", price) or price
            chg   = ((price - prev) / prev * 100) if prev else 0
            hi52  = fi.year_high or info.get("fiftyTwoWeekHigh", 0) or 0
            lo52  = fi.year_low  or info.get("fiftyTwoWeekLow",  0) or 0
            rng   = ((price - lo52) / (hi52 - lo52) * 100) if (hi52 - lo52) > 0 else 50
            ma50  = float(hist["Close"].rolling(50).mean().iloc[-1])  if len(hist) >= 50  else None
            ma200 = float(hist["Close"].rolling(200).mean().iloc[-1]) if len(hist) >= 200 else None

            delta = hist["Close"].diff()
            gain  = delta.clip(lower=0).rolling(14).mean()
            loss  = (-delta.clip(upper=0)).rolling(14).mean()
            rsi   = float(100 - 100 / (1 + gain.iloc[-1] / loss.iloc[-1])) if loss.iloc[-1] != 0 else 50

            news  = [n.get("content", {}).get("title") or n.get("title","") for n in (t.news or [])[:5]]
            rec   = (info.get("recommendationKey") or "hold").upper()
            tgt   = info.get("targetMeanPrice")
            ups   = ((tgt - price) / price * 100) if tgt and price else None

            try:
                cal  = t.calendar or {}
                edates = cal.get("Earnings Date") or []
                edate  = str(edates[0]) if edates else None
            except:
                edate = None

            print(json.dumps({
                "ticker": ticker, "price": round(price,2), "change_pct": round(chg,2),
                "hi52": round(hi52,2), "lo52": round(lo52,2), "range_pct": round(rng,1),
                "ma50": round(ma50,2) if ma50 else None,
                "ma200": round(ma200,2) if ma200 else None,
                "rsi": round(rsi,1), "analyst": rec,
                "upside_pct": round(ups,1) if ups else None,
                "news": news, "earnings_date": edate,
            }))
            EOF
            ```

            ## Step 3 — Compute signal convergence score for each ticker

            For each ticker, score 7 independent signals (each true or false):
            - oversold_rsi: rsi < 50
            - near_52w_low: range_pct < 30
            - analyst_upside_15pct: upside_pct >= 15
            - no_binary_risk: earnings_date is null OR more than 7 days from today
            - positive_fcf: true if analyst consensus is BUY or STRONG_BUY (proxy when FCF unavailable)
            - institutional_backing: true by default for large-cap names (cannot compute from yfinance fast_info)
            - price_stabilizing: price >= ma50 (or ma50 is null)

            convergence_score = count of true signals (0–7)
            CONVICTION FLOOR: if convergence_score < 5, verdict MUST be WATCH regardless of other signals.

            ## Step 4 — Analyse and issue a verdict for each ticker

            Using the data + convergence score above, reason carefully:

            **Check:**
            - 52-week range position (bottom third = potential value, top third = extended)
            - Price vs MA50 and MA200 (above both = bullish structure)
            - RSI: >70 overbought, <30 oversold
            - Analyst consensus and upside to price target
            - News sentiment (scan headlines for catalysts or risks)
            - Earnings proximity: within 5 calendar days = flag is_important_day

            **Leveraged ETF rules** (applies to SOXL, MVLL, any ticker with 3X/2X/L suffix):
            - Max hold 1–3 days only
            - Never hold through earnings
            - Do not buy after a 15%+ single-day run
            - Always set a tight exit_target

            **Quality rule:** If signals conflict or are weak, issue WATCH — a wrong BUY/SELL is worse than no advice.

            **Busy professional signals — required for every ticker:**
            - entry_quality: GREAT (oversold/near support, excellent risk-reward) | FAIR (reasonable but not ideal) | WAIT (extended/overbought)
            - hold_and_forget_rating: HOLD_AND_FORGET (low vol, strong fundamentals, no near-term events) | CHECK_MONTHLY (moderate risk) | WATCH_CLOSELY (earnings <30 days, high beta, leveraged, or thesis at risk)
            - position_size_pct: scale with conviction, inverse of risk. HIGH conviction + LOW risk = "7-10%". LOW conviction + HIGH risk = "2-3%".
            - Three scenarios (bull/base/bear probabilities MUST sum to 100).

            Produce one JSON object per ticker:
            ```json
            {
              "verdict": "BUY|HOLD|SELL|WATCH",
              "entry_target": <float or null>,
              "exit_target": <float or null>,
              "stop_loss": <float or null>,
              "hold_period": "<e.g. '3-5 days', '2-4 weeks', '1-3 months' — or null if WATCH/SELL>",
              "reasoning": "<10-15 lines: price action, technicals, analyst view, news, risk>",
              "conviction_score": <integer 0-100>,
              "risk_level": "LOW|MED|HIGH",
              "confidence": "High|Medium|Low",
              "bull_case": "<one plain-English sentence>",
              "bear_case": "<one plain-English sentence>",
              "thesis_invalidation": "<one sentence — what would flip this verdict>",
              "news_summary": "<3-4 sentences synthesising today's news>",
              "ripple_analysis": "<2nd/3rd order effects of today's news on this ticker>",
              "is_important_day": <true|false>,
              "importance_reason": "<reason or empty string>",
              "entry_quality": "GREAT|FAIR|WAIT",
              "hold_and_forget_rating": "HOLD_AND_FORGET|CHECK_MONTHLY|WATCH_CLOSELY",
              "position_size_pct": "<e.g. '5-8%'>",
              "scenario_bull": "<one sentence>",
              "scenario_bull_pct": <float — expected % return in bull case>,
              "scenario_bull_prob": <integer 0-100>,
              "scenario_base": "<one sentence>",
              "scenario_base_pct": <float>,
              "scenario_base_prob": <integer 0-100>,
              "scenario_bear": "<one sentence>",
              "scenario_bear_pct": <float — negative>,
              "scenario_bear_prob": <integer 0-100>,
              "dont_panic_note": "<if price dropped >15% from a prior BUY, address it directly; otherwise empty string>",
              "signal_convergence_score": <integer 0-7 from Step 3>,
              "convergence_details": "{\"oversold_rsi\":true/false,\"near_52w_low\":true/false,\"analyst_upside_15pct\":true/false,\"no_binary_risk\":true/false,\"positive_fcf\":true/false,\"institutional_backing\":true/false,\"price_stabilizing\":true/false}"
            }
            ```

            ## Step 5 — POST each result to the backend

            ```bash
            curl -s -X POST "${{ secrets.BACKEND_URL }}/jobs/ingest-analysis?x_job_secret=${{ secrets.JOB_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '<full JSON with ticker, analysis_date, price fields + all verdict fields>'
            ```

            Map price fields: price→current_price, change_pct→price_change_pct, hi52→week52_high, lo52→week52_low, range_pct→week52_position_pct, ma50→ma50, ma200→ma200, analyst→analyst_consensus, upside_pct→analyst_upside_pct.
            Include ALL verdict fields directly: stop_loss, hold_period, conviction_score, risk_level, confidence, bull_case, bear_case, thesis_invalidation, entry_quality, hold_and_forget_rating, position_size_pct, scenario_bull, scenario_bull_pct, scenario_bull_prob, scenario_base, scenario_base_pct, scenario_base_prob, scenario_bear, scenario_bear_pct, scenario_bear_prob, dont_panic_note, signal_convergence_score, convergence_details.

            ## Step 7 — Print summary table

            ```
            === FinanceCompanion Nightly — <date> ===
            TICKER   VERDICT  PRICE    CHG%    RSI   IMPORTANT
            -------  -------  ------   -----   ---   ---------
            ...
            ==========================================
            ```

            On any per-ticker error (data fetch or POST failure), log the error and continue — never abort the full run.
