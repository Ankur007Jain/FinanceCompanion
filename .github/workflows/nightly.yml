name: Nightly Stock Analysis

on:
  schedule:
    - cron: "0 4 * * 1-5"   # 11 PM CT Mon–Fri (4 AM UTC)
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write
  id-token: write

jobs:
  # ── Job 1: compute batches of 5, skip already-analyzed tickers ──────────────
  split:
    name: "Split tickers into batches"
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      batches: ${{ steps.compute.outputs.batches }}
      has_work: ${{ steps.compute.outputs.has_work }}
    steps:
      - name: Compute ticker batches
        id: compute
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os

          backend = os.environ['BACKEND_URL']
          secret  = os.environ['ADMIN_SECRET']

          def fetch(url):
              r = subprocess.run(['curl', '-sf', url], capture_output=True, text=True, timeout=15)
              try:
                  return json.loads(r.stdout)
              except Exception:
                  return {}

          all_tickers = fetch(f"{backend}/jobs/admin/tickers?x_admin_secret={secret}").get('tickers', [])
          if not all_tickers:
              all_tickers = ['NFLX', 'MRVL', 'SOXQ', 'SOXL', 'MVLL']

          analyzed = set(fetch(f"{backend}/jobs/admin/analyzed-today?x_admin_secret={secret}").get('analyzed', []))
          remaining = [t for t in all_tickers if t not in analyzed]

          print(f"Total watchlist : {len(all_tickers)} tickers")
          print(f"Already done    : {len(analyzed)} — {sorted(analyzed & set(all_tickers))}")
          print(f"To analyze      : {len(remaining)} — {remaining}")

          BATCH = 5
          if remaining:
              batches  = [','.join(remaining[i:i+BATCH]) for i in range(0, len(remaining), BATCH)]
              has_work = 'true'
          else:
              batches  = ['__SKIP__']
              has_work = 'false'

          print(f"Batches ({len(batches)}) : {batches}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"batches={json.dumps(batches)}\n")
              f.write(f"has_work={has_work}\n")
          PYEOF

  # ── Job 2: one parallel job per batch of 5 ──────────────────────────────────
  analyze:
    name: "Analyze [${{ matrix.batch }}]"
    needs: split
    if: needs.split.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      matrix:
        batch: ${{ fromJson(needs.split.outputs.batches) }}
      fail-fast: false   # one batch failing doesn't cancel the others

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data deps
        run: pip install yfinance pandas pandas-ta finnhub-python requests google-genai

      - name: Analyze batch
        uses: anthropics/claude-code-action@beta
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          mode: agent
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "Bash,Edit,Read,Write,Glob,Grep,LS"
          direct_prompt: |
            You are FinanceCompanion's nightly stock analysis agent. Today is $(date +%Y-%m-%d).

            ## Your assigned tickers (analyze ALL of these — no skipping)

            ${{ matrix.batch }}

            These have already been filtered against today's analyzed list — work through every
            ticker in the list above. If a POST returns 409 (already exists), move on.

            ## Step 1 — Fetch market data for each ticker

            Run this Python script once per ticker (replace TICKER with the actual symbol).
            It prints the analysis summary AND saves full raw data to /tmp/raw_TICKER.json:
            ```bash
            python3 << 'EOF'
            import yfinance as yf, json
            from datetime import date

            ticker = "TICKER"
            t = yf.Ticker(ticker)
            info = t.info or {}
            hist = t.history(period="1y")
            fi = t.fast_info
            raw_news = t.news or []
            try:
                calendar = t.calendar or {}
            except Exception:
                calendar = {}

            price = fi.last_price or info.get("currentPrice", 0) or 0
            prev  = fi.previous_close or info.get("previousClose", price) or price
            chg   = ((price - prev) / prev * 100) if prev else 0
            hi52  = fi.year_high or info.get("fiftyTwoWeekHigh", 0) or 0
            lo52  = fi.year_low  or info.get("fiftyTwoWeekLow",  0) or 0
            rng   = ((price - lo52) / (hi52 - lo52) * 100) if (hi52 - lo52) > 0 else 50
            ma50  = float(hist["Close"].rolling(50).mean().iloc[-1])  if len(hist) >= 50  else None
            ma200 = float(hist["Close"].rolling(200).mean().iloc[-1]) if len(hist) >= 200 else None

            delta = hist["Close"].diff()
            gain  = delta.clip(lower=0).rolling(14).mean()
            loss  = (-delta.clip(upper=0)).rolling(14).mean()
            rsi   = float(100 - 100 / (1 + gain.iloc[-1] / loss.iloc[-1])) if loss.iloc[-1] != 0 else 50

            news_titles = [n.get("content", {}).get("title") or n.get("title","") for n in raw_news[:5]]
            rec   = (info.get("recommendationKey") or "hold").upper()
            tgt   = info.get("targetMeanPrice")
            ups   = ((tgt - price) / price * 100) if tgt and price else None

            try:
                edates = calendar.get("Earnings Date") or []
                edate  = str(edates[0]) if edates else None
            except Exception:
                edate = None

            # Print summary dict for analysis steps below
            _summary = {
                "ticker": ticker, "price": round(price,2), "change_pct": round(chg,2),
                "hi52": round(hi52,2), "lo52": round(lo52,2), "range_pct": round(rng,1),
                "ma50": round(ma50,2) if ma50 else None,
                "ma200": round(ma200,2) if ma200 else None,
                "rsi": round(rsi,1), "analyst": rec,
                "upside_pct": round(ups,1) if ups else None,
                "news": news_titles, "earnings_date": edate,
            }
            print(json.dumps(_summary))
            with open(f"/tmp/summary_{ticker}.json", "w") as f:
                json.dump(_summary, f)

            # Serialize full raw data for the snapshot endpoint
            try:
                hist_r = hist.reset_index()
                hist_r["Date"] = hist_r["Date"].astype(str)
                history_json = hist_r.to_json(orient="records")
            except Exception:
                history_json = "[]"

            try:
                cal_s = {}
                for k, v in (calendar or {}).items():
                    cal_s[k] = [str(x) for x in v] if isinstance(v, list) else str(v)
                calendar_json = json.dumps(cal_s)
            except Exception:
                calendar_json = "{}"

            try:
                news_json = json.dumps(raw_news)
            except Exception:
                news_json = "[]"

            try:
                info_json = json.dumps(info)
            except Exception:
                info_json = "{}"

            with open(f"/tmp/raw_{ticker}.json", "w") as f:
                json.dump({
                    "info_json": info_json,
                    "history_json": history_json,
                    "news_json": news_json,
                    "calendar_json": calendar_json,
                }, f)
            EOF
            ```

            ## Step 1b — Save raw snapshot to backend

            After fetching data for each ticker, POST the raw snapshot (replace TICKER and TODAY):
            ```bash
            python3 << 'EOF'
            import json, subprocess, os
            from datetime import date

            ticker = "TICKER"
            today = str(date.today())
            backend = os.environ.get("BACKEND_URL", "${{ secrets.BACKEND_URL }}")
            secret  = os.environ.get("JOB_SECRET", "${{ secrets.JOB_SECRET }}")

            with open(f"/tmp/raw_{ticker}.json") as f:
                raw = json.load(f)

            payload = json.dumps({
                "ticker": ticker,
                "cache_date": today,
                "info_json": raw["info_json"],
                "history_json": raw["history_json"],
                "news_json": raw["news_json"],
                "calendar_json": raw["calendar_json"],
            })

            r = subprocess.run(
                ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}",
                 "-X", "POST", f"{backend}/jobs/ingest-snapshot?x_job_secret={secret}",
                 "-H", "Content-Type: application/json",
                 "-d", payload],
                capture_output=True, text=True
            )
            print(f"[{ticker}] Snapshot saved — HTTP {r.stdout.strip()}")
            EOF
            ```

            ## Step 2 — Compute signal convergence score for each ticker

            Score 7 independent signals (true/false each):
            - oversold_rsi: rsi < 50
            - near_52w_low: range_pct < 30
            - analyst_upside_15pct: upside_pct >= 15
            - no_binary_risk: earnings_date is null OR more than 7 days from today
            - positive_fcf: true if analyst consensus is BUY or STRONG_BUY
            - institutional_backing: true by default for large-cap names
            - price_stabilizing: price >= ma50 (or ma50 is null)

            convergence_score = count of true signals (0–7)
            CONVICTION FLOOR: convergence_score < 5 → verdict MUST be WATCH.

            ## Step 3a — Your verdict: Claude Sonnet 4.6 (Verdict A)

            **Check:** 52-week range position · price vs MA50/MA200 · RSI · analyst consensus ·
            news sentiment · earnings proximity (within 5 days → is_important_day=true)

            **Leveraged ETF rules** (SOXL, MVLL, any 3X/2X/L ticker):
            max hold 1–3 days · never hold through earnings · no buy after 15%+ single-day run · tight exit_target

            **Quality rule:** weak or conflicting signals → WATCH. Wrong advice is worse than no advice.

            **Required for every ticker:**
            - entry_quality: GREAT | FAIR | WAIT
            - hold_and_forget_rating: HOLD_AND_FORGET | CHECK_MONTHLY | WATCH_CLOSELY
            - position_size_pct: e.g. "5-8%" — scale with conviction, inverse of risk
            - Three scenarios — bull + base + bear probabilities MUST sum to 100

            Produce one JSON object per ticker and save it to /tmp/verdict_a_TICKER.json:
            ```json
            {
              "verdict": "BUY|HOLD|SELL|WATCH",
              "entry_target": <float or null>,
              "exit_target": <float or null>,
              "stop_loss": <float or null>,
              "hold_period": "<'3-5 days' / '2-4 weeks' / '1-3 months' — null if WATCH/SELL>",
              "reasoning": "<10-15 lines>",
              "conviction_score": <0-100>,
              "risk_level": "LOW|MED|HIGH",
              "confidence": "High|Medium|Low",
              "bull_case": "<one sentence>",
              "bear_case": "<one sentence>",
              "thesis_invalidation": "<one sentence>",
              "news_summary": "<3-4 sentences>",
              "ripple_analysis": "<2nd/3rd order effects>",
              "is_important_day": <true|false>,
              "importance_reason": "<reason or empty string>",
              "entry_quality": "GREAT|FAIR|WAIT",
              "hold_and_forget_rating": "HOLD_AND_FORGET|CHECK_MONTHLY|WATCH_CLOSELY",
              "position_size_pct": "<e.g. '5-8%'>",
              "scenario_bull": "<one sentence>",
              "scenario_bull_pct": <float>,
              "scenario_bull_prob": <0-100>,
              "scenario_base": "<one sentence>",
              "scenario_base_pct": <float>,
              "scenario_base_prob": <0-100>,
              "scenario_bear": "<one sentence>",
              "scenario_bear_pct": <negative float>,
              "scenario_bear_prob": <0-100>,
              "dont_panic_note": "<address >15% drop from prior BUY; otherwise empty string>",
              "signal_convergence_score": <0-7>,
              "convergence_details": "{\"oversold_rsi\":true/false,\"near_52w_low\":true/false,\"analyst_upside_15pct\":true/false,\"no_binary_risk\":true/false,\"positive_fcf\":true/false,\"institutional_backing\":true/false,\"price_stabilizing\":true/false}"
            }
            ```
            Write the JSON to disk with a bash command, e.g.:
            ```bash
            cat > /tmp/verdict_a_TICKER.json << 'JSONEOF'
            {...the JSON you produced above...}
            JSONEOF
            ```

            ## Step 3b — Gemini verdict (Verdict B)

            Run this Python script per ticker (replace TICKER with the actual symbol):
            ```bash
            python3 << 'PYEOF'
            import json, os, re, time
            from google import genai
            from google.genai import types

            ticker = "TICKER"
            api_key = os.environ.get("GEMINI_API_KEY", "")
            if not api_key:
                print(f"[{ticker}] GEMINI_API_KEY not set — skipping Verdict B")
                with open(f"/tmp/verdict_b_{ticker}.json", "w") as f:
                    json.dump({"verdict": None}, f)
                raise SystemExit(0)

            with open(f"/tmp/summary_{ticker}.json") as f:
                d = json.load(f)

            news_str = "; ".join(d.get("news", [])[:3])
            prompt = f"""You are an independent stock analyst. Analyze {ticker} and return ONLY valid JSON with no markdown fences.

            Data for {ticker}:
            Price: ${d.get('price', 0):.2f} ({d.get('change_pct', 0):+.2f}% today)
            52-week range: ${d.get('lo52', 0):.2f}–${d.get('hi52', 0):.2f} ({d.get('range_pct', 50):.1f}% of range)
            RSI(14): {d.get('rsi', 50):.1f}
            MA50: {d.get('ma50') or 'N/A'}  MA200: {d.get('ma200') or 'N/A'}
            Analyst consensus: {d.get('analyst', 'HOLD')}  Analyst upside: {d.get('upside_pct') or 'N/A'}%
            Recent news: {news_str}
            Next earnings: {d.get('earnings_date') or 'Unknown'}

            Reply with exactly this JSON object and nothing else:
            {{
              "verdict": "BUY or HOLD or SELL or WATCH",
              "reasoning": "5-8 sentence analysis",
              "conviction_score": 0,
              "risk_level": "LOW or MED or HIGH",
              "bull_case": "one sentence",
              "bear_case": "one sentence"
            }}"""

            client = genai.Client(api_key=api_key)
            verdict_b = None

            for attempt in range(3):
                try:
                    resp = client.models.generate_content(
                        model="gemini-2.5-flash",
                        contents=prompt,
                        config=types.GenerateContentConfig(
                            thinking_config=types.ThinkingConfig(thinking_budget=0)
                        ),
                    )
                    raw = resp.text.strip()
                    raw = re.sub(r"^```json\s*", "", raw)
                    raw = re.sub(r"\s*```$", "", raw)
                    verdict_b = json.loads(raw)
                    print(f"[{ticker}] Verdict B (Gemini): {verdict_b.get('verdict')}")
                    break
                except Exception as e:
                    print(f"[{ticker}] Gemini attempt {attempt + 1}/3 failed: {e}")
                    if attempt < 2:
                        time.sleep(30)

            if verdict_b is None:
                print(f"[{ticker}] Gemini failed after 3 attempts — verdict_b will be null")
                verdict_b = {"verdict": None}

            with open(f"/tmp/verdict_b_{ticker}.json", "w") as f:
                json.dump(verdict_b, f)
            PYEOF
            ```

            ## Step 3c — Judge: reconcile both verdicts

            Read /tmp/verdict_a_TICKER.json and /tmp/verdict_b_TICKER.json and apply this agreement table
            to produce final_verdict, verdict_agreement (true/false/null), and split_reason:

            | Verdict A  | Verdict B  | Final verdict | verdict_agreement |
            |------------|------------|---------------|-------------------|
            | X          | X (same)   | X             | true              |
            | BUY        | HOLD       | WATCH         | false             |
            | BUY        | SELL       | WATCH         | false             |
            | BUY        | WATCH      | WATCH         | false             |
            | HOLD       | SELL       | WATCH         | false             |
            | HOLD       | WATCH      | WATCH         | false             |
            | SELL       | WATCH      | SELL          | false             |
            | WATCH      | SELL       | SELL          | false             |
            | (any)      | null       | verdict_a     | null (Gemini N/A) |

            When verdict_agreement=false, write split_reason as one sentence explaining the key disagreement
            (e.g. "Claude sees oversold RSI as a buy signal; Gemini flags near-term earnings risk as bearish").

            Store final_verdict, verdict_a, verdict_b, verdict_agreement, split_reason in working memory
            for Step 4. The `verdict` field in Step 4 must be final_verdict (the judge's output).

            ## Step 4 — POST each result to the backend

            ```bash
            curl -s -X POST "${{ secrets.BACKEND_URL }}/jobs/ingest-analysis?x_job_secret=${{ secrets.JOB_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '<full JSON: ticker, analysis_date, price fields + all verdict fields>'
            ```

            Price field mapping: price→current_price, change_pct→price_change_pct,
            hi52→week52_high, lo52→week52_low, range_pct→week52_position_pct,
            ma50→ma50, ma200→ma200, analyst→analyst_consensus, upside_pct→analyst_upside_pct.

            Include ALL verdict fields: stop_loss, hold_period, conviction_score, risk_level,
            confidence, bull_case, bear_case, thesis_invalidation, entry_quality,
            hold_and_forget_rating, position_size_pct, all scenario_* fields, dont_panic_note,
            signal_convergence_score, convergence_details.

            Include dual-agent fields from Step 3c: verdict_a, verdict_b, verdict_agreement,
            split_reason. Use null for verdict_b/verdict_agreement/split_reason if Gemini was unavailable.
            The `verdict` field MUST be final_verdict from Step 3c (judge output), not raw verdict_a.

            Also include earnings_date (the raw string from yfinance, e.g. "2026-07-15") if available, else omit it.

            ## Step 5 — Print summary

            ```
            === Batch complete — <date> ===
            TICKER   VERDICT  VERDICT_A  VERDICT_B  AGREEMENT  PRICE  CHG%  RSI  CONVERGENCE
            ✅ = both models agree  ⚠️ = split verdict  — = Gemini unavailable
            ```

            On any per-ticker error, log it and continue — never abort the batch.
