name: Security

on:
  pull_request:
    branches: [main]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit
      - run: bandit -r backend/ --severity-level HIGH --exclude backend/tests/ -f json -o reports/bandit.json || true
      - run: bandit -r backend/ --severity-level HIGH --exclude backend/tests/ --exit-zero
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: reports/bandit.json
          retention-days: 5

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm ci && npm audit --audit-level=high
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-gate:
    runs-on: ubuntu-latest
    needs: [bandit, dependency-audit, secret-scan]
    steps:
      - run: echo "Security gate passed."
