name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: |
          cd backend
          pytest tests/ -v --junitxml=../reports/pytest.xml --alluredir=../allure-results
        env:
          DATABASE_URL: sqlite:///./test.db
          ANTHROPIC_API_KEY: test-key
          GOOGLE_CLIENT_ID: test-client-id
          FINNHUB_API_KEY: test-key
          JOB_SECRET: test-job-secret
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: backend-results
          path: |
            reports/pytest.xml
            allure-results/
          retention-days: 5

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - run: mkdir -p reports && npm test -- --ci
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: frontend-results
          path: reports/jest.xml
          retention-days: 5

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: npm ci
      - run: npx playwright install chromium
      - name: Start backend
        run: |
          cd backend
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 3
        env:
          DATABASE_URL: sqlite:///./test.db
          ANTHROPIC_API_KEY: test-key
          GOOGLE_CLIENT_ID: test-client-id
          FINNHUB_API_KEY: test-key
          JOB_SECRET: test-job-secret
          FRONTEND_URL: http://localhost:3000
      - name: Start frontend
        run: npm run build && npm start &
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
          AUTH_SECRET: test-secret-32-chars-long-padded!!
          AUTH_GOOGLE_ID: test
          AUTH_GOOGLE_SECRET: test
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            sleep 3
          done
      - run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: e2e-results
          path: |
            reports/playwright.xml
            allure-results/
          retention-days: 5

  allure-report:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit, e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { path: artifacts/ }
      - name: Summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Unit | ${{ needs.frontend-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
