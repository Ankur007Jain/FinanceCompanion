name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  # ── Backend unit tests ───────────────────────────────────────────────────────
  backend-tests:
    name: pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite:///./test.db
      ANTHROPIC_API_KEY: test-key
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          mkdir -p ../reports ../allure-results
          pytest tests/ -v --tb=short \
            --junitxml=../reports/pytest.xml \
            --alluredir=../allure-results

      - name: Publish pytest report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest results
          path: reports/pytest.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Allure results (pytest)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-pytest
          path: allure-results/
          retention-days: 1

      - name: Upload pytest XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-xml
          path: reports/pytest.xml
          retention-days: 14

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  frontend-unit:
    name: jest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: |
          mkdir -p reports allure-results
          npx jest --ci
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8001

      - name: Publish Jest report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: jest results
          path: reports/jest.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Allure results (jest)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-jest
          path: allure-results/
          retention-days: 1

      - name: Upload Jest XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-xml
          path: reports/jest.xml
          retention-days: 14

  # ── E2E smoke tests ──────────────────────────────────────────────────────────
  e2e:
    name: playwright
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit]

    env:
      DATABASE_URL: sqlite:///./test.db
      ANTHROPIC_API_KEY: test-key
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      BACKEND_URL: http://localhost:8001
      AUTH_SECRET: test-secret-32-chars-long-padded!!
      AUTH_GOOGLE_ID: test
      AUTH_GOOGLE_SECRET: test
      E2E_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Start backend
        working-directory: backend
        run: |
          pip install -r requirements.txt
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 3

      - name: Start frontend
        run: npm run build && npm start &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            sleep 3
          done

      - name: Run Playwright
        run: |
          mkdir -p reports allure-results
          npx playwright test

      - name: Publish Playwright report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: playwright results
          path: reports/playwright.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Allure results (playwright)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-playwright
          path: allure-results/
          retention-days: 1

      - name: Upload Playwright XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-xml
          path: reports/playwright.xml
          retention-days: 14

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14

  # ── Allure unified report ─────────────────────────────────────────────────────
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit, e2e]
    if: always()

    steps:
      - name: Download Allure results (pytest)
        uses: actions/download-artifact@v4
        with:
          name: allure-pytest
          path: allure-results/
        continue-on-error: true

      - name: Download Allure results (jest)
        uses: actions/download-artifact@v4
        with:
          name: allure-jest
          path: allure-results/
        continue-on-error: true

      - name: Download Allure results (playwright)
        uses: actions/download-artifact@v4
        with:
          name: allure-playwright
          path: allure-results/
        continue-on-error: true

      - name: Download pytest XML
        uses: actions/download-artifact@v4
        with:
          name: pytest-xml
          path: reports/
        continue-on-error: true

      - name: Download Jest XML
        uses: actions/download-artifact@v4
        with:
          name: jest-xml
          path: reports/
        continue-on-error: true

      - name: Download Playwright XML
        uses: actions/download-artifact@v4
        with:
          name: playwright-xml
          path: reports/
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline --silent

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-html
        continue-on-error: true

      - name: Write job summary
        run: |
          python3 << 'PYEOF'
          import os, xml.etree.ElementTree as ET

          def parse_junit(path):
              try:
                  root = ET.parse(path).getroot()
                  suites = root.findall('.//testsuite') or [root]
                  tests    = sum(int(s.get('tests',    0)) for s in suites)
                  failures = sum(int(s.get('failures', 0)) for s in suites)
                  errors   = sum(int(s.get('errors',   0)) for s in suites)
                  skipped  = sum(int(s.get('skipped',  0)) for s in suites)
                  passed   = tests - failures - errors - skipped
                  return passed, failures + errors, skipped, tests
              except Exception:
                  return None

          suites = [
              ("pytest",     "reports/pytest.xml"),
              ("Jest",       "reports/jest.xml"),
              ("Playwright", "reports/playwright.xml"),
          ]

          rows, total_p, total_f, total_s, total_t = [], 0, 0, 0, 0
          for name, path in suites:
              result = parse_junit(path)
              if result:
                  p, f, s, t = result
                  icon = "✅" if f == 0 else "❌"
                  rows.append(f"| {icon} **{name}** | {p} | {f} | {s} | {t} |")
                  total_p += p; total_f += f; total_s += s; total_t += t
              else:
                  rows.append(f"| ⚠️ **{name}** | — | — | — | — |")

          overall = "✅ All passing" if total_f == 0 else f"❌ {total_f} failing"
          header = "| Suite | ✅ Passed | ❌ Failed | ⏭️ Skipped | Total |"
          divider = "|-------|-----------|-----------|------------|-------|"
          footer = f"| **Total** | **{total_p}** | **{total_f}** | **{total_s}** | **{total_t}** |"
          table = "\n".join([header, divider] + rows + [footer])
          summary = f"## Test Results — {overall}\n\n{table}\n\n> Full Allure report available in the **allure-report** artifact below\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          PYEOF

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-html/
          retention-days: 30
