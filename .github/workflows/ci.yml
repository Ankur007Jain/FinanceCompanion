name: Agentic CI Pipeline

# Unified pipeline — all jobs in one file, parallelised where possible.
#
# Tier 1 (always, parallel):  pytest · jest · bandit · semgrep · dep-audit · secret-scan
# Tier 2:                     e2e · fix-gates · qa-agent · security-fix-agent · security-gate
# Tier 3:                     check-bugs · allure-report
# Tier 4:                     fix-agent
# Tier 5:                     re-test · docs-agent
# Tier 6:                     summary (PR comment)
#
# PR-only jobs: e2e, fix-gates, qa-agent, security-fix-agent, check-bugs, fix-agent, re-test, docs-agent, summary
# Self-healing:  fix-gates          heals broken CI gates (commits fix, re-triggers)
#                security-fix-agent heals bandit/semgrep findings (commits fix, re-triggers)
#                fix-agent          heals bugs the QA agent found in the PR diff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write       # agents commit fixes + docs
  pull-requests: write  # post PR comment + dorny annotations
  checks: write         # dorny test-reporter
  id-token: write       # claude-code-action OIDC

env:
  BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
  HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 1 — run in parallel on every push
# ═══════════════════════════════════════════════════════════════════════════════

  # ── Backend unit tests ──────────────────────────────────────────────────────
jobs:
  pytest:
    name: "pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      ANTHROPIC_API_KEY: test-key
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pytest
        id: run-pytest
        continue-on-error: true
        run: |
          mkdir -p ../reports ../allure-results
          pytest tests/ -v --tb=short \
            --junitxml=../reports/pytest.xml \
            --alluredir=../allure-results \
            2>&1 | tee pytest-output.txt
      - name: Publish results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest
          path: reports/pytest.xml
          reporter: java-junit
          fail-on-error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-xml
          path: reports/pytest.xml
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-pytest
          path: allure-results/
          retention-days: 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-output
          path: backend/pytest-output.txt
          retention-days: 1
      - name: Fail if pytest failed
        if: steps.run-pytest.outcome == 'failure'
        run: exit 1

  # ── Frontend unit tests ─────────────────────────────────────────────────────
  jest:
    name: "jest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run jest
        id: run-jest
        continue-on-error: true
        run: |
          mkdir -p reports
          npx jest --ci --no-coverage 2>&1 | tee jest-output.txt
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      - name: Publish results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: jest
          path: reports/jest.xml
          reporter: java-junit
          fail-on-error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-xml
          path: reports/jest.xml
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-output
          path: jest-output.txt
          retention-days: 1
      - name: Fail if jest failed
        if: steps.run-jest.outcome == 'failure'
        run: exit 1

  # ── Bandit — Python static analysis ────────────────────────────────────────
  bandit:
    name: "bandit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit[toml]
      - name: Run Bandit
        run: |
          bandit -r backend/ \
            -x backend/tests,backend/venv \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
      - name: Summary
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              data = json.load(f)
          m = data.get("metrics", {}).get("_totals", {})
          high = int(m.get("SEVERITY.HIGH", 0))
          print(f"Bandit: HIGH={high}  MEDIUM={int(m.get('SEVERITY.MEDIUM',0))}  LOW={int(m.get('SEVERITY.LOW',0))}")
          for r in data.get("results", []):
              print(f"  [{r['issue_severity']}] {r['issue_text']} — {r['filename']}:{r['line_number']}")
          if high > 0:
              print("❌ High severity issues found!")
              sys.exit(1)
          print("✅ No high severity issues.")
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 5

  # ── Semgrep — JS + Python SAST ──────────────────────────────────────────────
  semgrep:
    name: "semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/python \
            --config=p/react \
            --config=p/nextjs \
            --config=p/secrets \
            --config=p/sql-injection \
            --exclude=node_modules \
            --exclude=.next \
            --json > semgrep-report.json || true
      - name: Summary
        run: |
          python3 - <<'EOF'
          import json, sys
          with open("semgrep-report.json") as f:
              data = json.load(f)
          findings = data.get("results", [])
          print(f"Semgrep: {len(findings)} findings")
          for r in findings[:20]:
              sev  = r.get("extra", {}).get("severity", "INFO")
              msg  = r.get("extra", {}).get("message", "")[:100]
              path = r.get("path", "")
              line = r.get("start", {}).get("line", "")
              print(f"  [{sev}] {path}:{line} — {msg}")
          if any(r.get("extra", {}).get("severity") == "ERROR" for r in findings):
              print("❌ Critical findings detected!")
              sys.exit(1)
          print("✅ No critical findings.")
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 5

  # ── Dependency audit — npm + pip ────────────────────────────────────────────
  dependency-audit:
    name: "dep-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: npm audit
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          node -e "
            const r = require('./npm-audit.json');
            const vulns = r.vulnerabilities || {};
            const high = Object.values(vulns).filter(v => ['high','critical'].includes(v.severity));
            console.log('npm: ' + Object.keys(vulns).length + ' total, ' + high.length + ' high/critical');
            high.forEach(v => console.log('  [' + v.severity.toUpperCase() + '] ' + v.name));
            if (high.length > 0) { process.exit(1); }
          "
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format json -o pip-audit.json || true
          python3 - <<'EOF'
          import json
          try:
              data = json.load(open("pip-audit.json"))
              vulns = data.get("vulnerabilities", [])
              print(f"pip-audit: {len(vulns)} vulnerabilities")
              for v in vulns:
                  print(f"  {v.get('name')} {v.get('version')} — {v.get('id')}")
          except Exception as e:
              print(f"Could not parse pip-audit: {e}")
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dep-audit
          path: |
            npm-audit.json
            pip-audit.json
          retention-days: 5

  # ── Secret scan — Gitleaks ──────────────────────────────────────────────────
  secret-scan:
    name: "secret-scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 2 — after pytest + jest (PR-only jobs)
# ═══════════════════════════════════════════════════════════════════════════════

  # ── E2E smoke ───────────────────────────────────────────────────────────────
  e2e:
    name: "playwright"
    runs-on: ubuntu-latest
    needs: [pytest, jest]
    if: github.event_name == 'pull_request'
    env:
      DATABASE_URL: sqlite:///./test.db
      ANTHROPIC_API_KEY: test-key
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      BACKEND_URL: http://localhost:8001
      AUTH_SECRET: test-secret-32-chars-long-padded!!
      AUTH_GOOGLE_ID: test
      AUTH_GOOGLE_SECRET: test
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Start backend
        working-directory: backend
        run: |
          pip install -r requirements.txt
          uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 3
      - name: Start frontend
        run: npm run build && npm start &
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3000 && break; sleep 3; done
      - name: Run Playwright
        run: |
          mkdir -p reports allure-results
          npx playwright test
      - name: Publish results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: playwright
          path: reports/playwright.xml
          reporter: java-junit
          fail-on-error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-xml
          path: reports/playwright.xml
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-playwright
          path: allure-results/
          retention-days: 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html
          path: playwright-report/
          retention-days: 5

  # ── Self-healing: fix gate failures ────────────────────────────────────────
  fix-gates:
    name: "fix-gates (self-heal)"
    runs-on: ubuntu-latest
    needs: [pytest, jest]
    if: "always() && (needs.pytest.result == 'failure' || needs.jest.result == 'failure') && github.event_name == 'pull_request' && !contains(github.actor, '[bot]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Download pytest output
        uses: actions/download-artifact@v4
        with:
          name: pytest-output
          path: reports/
        continue-on-error: true
      - name: Download jest output
        uses: actions/download-artifact@v4
        with:
          name: jest-output
          path: reports/
        continue-on-error: true
      - name: Run fix agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are a senior Software Engineer. CI gate tests are failing on this PR. Fix the source code so all tests pass.

            Step 1: Read reports/pytest-output.txt and reports/jest-output.txt (if they exist).
            Identify every failing test, its error, and the suspected source file.

            Step 2: For each failure:
            1. Read the failing test to understand what it expects
            2. Read the suspected source file
            3. Fix the root cause in the SOURCE file — never edit test files
            4. Re-run the specific test to confirm it passes:
               - pytest: `cd backend && ANTHROPIC_API_KEY=test-key pytest {test_file}::{test_name} -v`
               - jest:   `NEXT_PUBLIC_BACKEND_URL=http://localhost:8001 npx jest --testNamePattern "{test_name}" --no-coverage`

            Step 3: Run the full suites to confirm nothing else broke:
            - `cd backend && ANTHROPIC_API_KEY=test-key pytest tests/ -v --tb=short 2>&1 | tail -30`
            - `NEXT_PUBLIC_BACKEND_URL=http://localhost:8001 npx jest --ci --no-coverage 2>&1 | tail -20`

            Step 4: Commit:
            ```
            git add {source files changed — NEVER test files}
            git commit -m "fix: resolve gate failures (auto-fix)"
            ```

            Hard rules: edit SOURCE files only, fix root causes not symptoms,
            verify each fix before committing, do NOT commit if not confident.

  # ── QA Agent — find bugs, write missing tests ──────────────────────────────
  qa-agent:
    name: "qa-agent"
    runs-on: ubuntu-latest
    needs: [pytest, jest]
    if: github.event_name == 'pull_request' && !contains(github.actor, '[bot]')
    env:
      DATABASE_URL: sqlite:///./test.db
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: mkdir -p reports
      - name: Write new tests (Claude agent)
        uses: anthropics/claude-code-action@beta
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are a senior Automation Test Engineer reviewing a PR for FinanceCompanion.
            Base branch: ${{ env.BASE_REF }}

            Step 1: Run `git diff ${{ env.BASE_REF }}..HEAD --stat` and `git log ${{ env.BASE_REF }}..HEAD --oneline`.
            Read every changed source file.

            Step 2: For every new or changed FastAPI endpoint or Python function that lacks a test,
            write a pytest test in backend/tests/. For every new or changed TypeScript helper,
            write a jest test in __tests__/.
            Test conventions:
            - Backend: use conftest.py fixtures; mock auth via patch("routers.auth.id_token.verify_oauth2_token", return_value={"email":"test@example.com","name":"Test"})
            - Frontend: pure logic tests only — no React renderer; helpers like pct(), fmtCap() can be copied inline
            - Never call real external APIs (yfinance, Finnhub, Anthropic) — mock them

            Step 3: If you wrote any new test files, commit them:
            ```
            git add backend/tests/ __tests__/
            git commit -m "ci: add tests for ${{ env.BASE_REF }}..HEAD changes"
            ```
      - name: Run test suites
        run: |
          cd backend
          ANTHROPIC_API_KEY=test-key pytest tests/ -v --tb=short \
            --junitxml=../reports/pytest-qa.xml 2>&1 | tee ../reports/pytest-qa.txt || true
          cd ..
          npx jest --ci --no-coverage 2>&1 | tee reports/jest-qa.txt || true
      - name: Generate QA report
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          from datetime import datetime, timezone

          # Parse pytest XML
          py_pass = py_fail = 0
          failures = []
          pytest_xml = Path("reports/pytest-qa.xml")
          if pytest_xml.exists():
              tree = ET.parse(pytest_xml)
              root = tree.getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              if suite is not None:
                  py_pass = int(suite.get("tests", 0)) - int(suite.get("failures", 0)) - int(suite.get("errors", 0))
                  py_fail = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
                  for tc in suite.findall("testcase"):
                      fail = tc.find("failure") or tc.find("error")
                      if fail is not None:
                          msg = (fail.get("message") or "")[:120]
                          failures.append((tc.get("classname", "") + "::" + tc.get("name", ""), msg))

          # Parse jest output for summary line
          import re
          jest_pass = jest_fail = 0
          jest_txt = Path("reports/jest-qa.txt")
          if jest_txt.exists():
              for line in jest_txt.read_text().splitlines():
                  if "Tests:" in line:
                      m = re.search(r'(\d+)\s+passed', line)
                      if m: jest_pass = int(m.group(1))
                      m = re.search(r'(\d+)\s+failed', line)
                      if m: jest_fail = int(m.group(1))

          total_pass = py_pass + jest_pass
          total_fail = py_fail + jest_fail
          ts = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          lines = [
              f"## QA Report — ${{ env.BASE_REF }}..HEAD — {ts}",
              "### Summary",
              f"{total_pass} passing, {total_fail} failing, {len(failures)} bugs found",
              "### Bugs Found",
              "| # | Test | Error | Suspected source |",
              "|---|------|-------|-----------------|",
          ]
          for i, (name, msg) in enumerate(failures, 1):
              lines.append(f"| {i} | `{name}` | {msg} | see test output |")
          lines += [
              "### New Tests Written",
              "| File | Tests added |",
              "|------|-------------|",
          ]
          Path("reports/qa-report.md").write_text("\n".join(lines) + "\n")
          print("QA report written.")
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report
          path: reports/qa-report.md
          retention-days: 5

  # ── Security gate ───────────────────────────────────────────────────────────
  security-gate:
    name: "security-gate"
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, dependency-audit, secret-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "bandit:    ${{ needs.bandit.result }}"
          echo "semgrep:   ${{ needs.semgrep.result }}"
          echo "dep-audit: ${{ needs.dependency-audit.result }}"
          echo "secrets:   ${{ needs.secret-scan.result }}"
          if [[ "${{ needs.bandit.result }}" == "failure" || "${{ needs.semgrep.result }}" == "failure" ]]; then
            echo "❌ Security gate failed."
            exit 1
          fi
          echo "✅ Security gate passed."

  # ── Self-healing: fix security findings ─────────────────────────────────────
  # Fires when bandit or semgrep fail on a PR (never on bot commits).
  # Fixes root causes, commits, which re-triggers the pipeline so the
  # next run's security-gate can pass cleanly.
  security-fix-agent:
    name: "security-fix-agent (self-heal)"
    runs-on: ubuntu-latest
    needs: [bandit, semgrep]
    if: "always() && (needs.bandit.result == 'failure' || needs.semgrep.result == 'failure') && github.event_name == 'pull_request' && !contains(github.actor, '[bot]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt bandit[toml]
      - name: Download bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: reports/
        continue-on-error: true
      - name: Download semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/
        continue-on-error: true
      - name: Run security fix agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are a security engineer. Fix the real vulnerabilities found by Bandit and Semgrep.

            Step 1: Read reports/bandit-report.json — look in "results" for HIGH severity items.
            Read reports/semgrep-report.json — look in "results" for ERROR severity items.
            For each finding note: file path, line number, rule ID, and description.

            Step 2: For each finding, fix the root cause in the source file.
            Common patterns:
            - SQL injection        → use SQLAlchemy ORM or parameterized queries, never f-string SQL
            - Hardcoded secret     → read from os.getenv(), never inline
            - Insecure random      → use secrets.token_hex() / secrets.token_urlsafe() instead of random.*
            - subprocess shell=True → shell=False with a list of args
            - Path traversal       → os.path.abspath + check it starts with expected base dir
            - Insecure deserialization → validate/sanitize before unpickling

            Rules for suppression: ONLY add `# nosec <BXXX>` if the finding is a confirmed false
            positive AND you add an inline comment explaining exactly why (e.g. "# nosec B108 — /tmp
            path is intentional in test fixtures, never used in prod"). Never suppress without explanation.
            Never suppress entire files.

            Step 3: Verify fixes with a targeted re-scan:
            ```
            bandit -r backend/ -x backend/tests,backend/venv --severity-level medium -f json \
              -o /tmp/bandit-verify.json || true
            python3 -c "
            import json, sys
            d = json.load(open('/tmp/bandit-verify.json'))
            high = [r for r in d.get('results', []) if r['issue_severity'] == 'HIGH']
            print(f'{len(high)} HIGH issues remaining after fixes')
            for r in high:
                print(f'  {r[\"filename\"]}:{r[\"line_number\"]} — {r[\"issue_text\"]}')
            "
            ```

            Step 4: Commit — source files only, no test files, no report files:
            ```
            git add {fixed source files}
            git commit -m "fix: resolve security findings from bandit/semgrep (auto-fix)"
            ```

            If you cannot safely fix a finding without risk of breaking logic, do NOT commit it.
            Leave it with a comment in the file for human review and note it in your output.

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 3 — after qa-agent
# ═══════════════════════════════════════════════════════════════════════════════

  check-bugs:
    name: "check-bugs"
    runs-on: ubuntu-latest
    needs: qa-agent
    if: github.event_name == 'pull_request'
    outputs:
      bugs: ${{ steps.parse.outputs.bugs }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qa-report
          path: reports/
        continue-on-error: true
      - name: Parse report
        id: parse
        run: |
          python3 - << 'EOF'
          import os
          from pathlib import Path
          report = Path("reports/qa-report.md")
          found = False
          if report.exists():
              in_bugs = False
              for line in report.read_text(encoding="utf-8").splitlines():
                  if line.lstrip("#").strip().startswith("Bugs Found") and line.startswith("#"):
                      in_bugs = True; continue
                  if in_bugs and line.startswith("#"):
                      break
                  if in_bugs and line.startswith("| ") and not line.startswith("| #") and "---" not in line:
                      cells = [c.strip() for c in line.split("|")]
                      first = cells[1] if len(cells) > 1 else ""
                      second = cells[2] if len(cells) > 2 else ""
                      if first == "-" or "no bug" in second.lower():
                          continue
                      found = True; break
          result = "true" if found else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"bugs={result}\n")
          print(f"bugs={result}")
          EOF

  # ── Allure unified report (pytest + jest + e2e) ────────────────────────────
  allure-report:
    name: "allure-report"
    runs-on: ubuntu-latest
    needs: [pytest, jest, e2e]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with: { name: allure-pytest, path: allure-results/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: allure-playwright, path: allure-results/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: pytest-xml, path: reports/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: jest-xml, path: reports/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: playwright-xml, path: reports/ }
        continue-on-error: true
      - run: npm install -g allure-commandline --silent
      - run: allure generate allure-results --clean -o allure-html
        continue-on-error: true
      - name: Write job summary
        run: |
          python3 - << 'EOF'
          import os, xml.etree.ElementTree as ET
          def parse(path):
              try:
                  root = ET.parse(path).getroot()
                  ss = root.findall('.//testsuite') or [root]
                  t = sum(int(s.get('tests', 0)) for s in ss)
                  f = sum(int(s.get('failures', 0)) + int(s.get('errors', 0)) for s in ss)
                  sk = sum(int(s.get('skipped', 0)) for s in ss)
                  return t - f - sk, f, sk, t
              except Exception:
                  return None
          suites = [("pytest","reports/pytest.xml"),("Jest","reports/jest.xml"),("Playwright","reports/playwright.xml")]
          rows, tp, tf, ts, tt = [], 0, 0, 0, 0
          for name, path in suites:
              r = parse(path)
              if r:
                  p, f, s, t = r
                  rows.append(f"| {'✅' if f==0 else '❌'} **{name}** | {p} | {f} | {s} | {t} |")
                  tp+=p; tf+=f; ts+=s; tt+=t
              else:
                  rows.append(f"| ⚠️ **{name}** | — | — | — | — |")
          overall = "✅ All passing" if tf == 0 else f"❌ {tf} failing"
          hdr = "| Suite | ✅ Passed | ❌ Failed | ⏭️ Skipped | Total |"
          div = "|-------|-----------|-----------|------------|-------|"
          foot = f"| **Total** | **{tp}** | **{tf}** | **{ts}** | **{tt}** |"
          table = "\n".join([hdr, div] + rows + [foot])
          summary = f"## Test Results — {overall}\n\n{table}\n\n> Full Allure report in the **allure-report** artifact\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-html
          path: allure-html/
          retention-days: 7

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 4 — fix bugs found by QA agent
# ═══════════════════════════════════════════════════════════════════════════════

  fix-agent:
    name: "fix-agent"
    runs-on: ubuntu-latest
    needs: check-bugs
    if: needs.check-bugs.outputs.bugs == 'true' && github.event_name == 'pull_request'
    env:
      DATABASE_URL: sqlite:///./test.db
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: qa-report
          path: reports/
      - name: Run fix agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are a senior Software Engineer. Fix every bug in reports/qa-report.md.

            Step 1: Read the "Bugs Found" table. For each bug: note the test, error, and suspected source.

            Step 2: For each bug:
            1. Read the failing test to understand what it expects
            2. Read the source file
            3. Run the specific test: `cd backend && pytest {file}::{name} -v 2>&1`
            4. Fix the source file
            5. Re-run to confirm it passes

            Step 3: Verify full suite is green:
            `cd backend && ANTHROPIC_API_KEY=test-key pytest tests/ -v --tb=short 2>&1 | tail -30`
            `npx jest --ci --no-coverage 2>&1 | tail -20`

            Step 4:
            ```
            git add {source files — NOT test files}
            git commit -m "fix: bugs resolved from qa-report"
            ```
            Edit SOURCE files only. Never edit test files. Verify before committing.

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 5 — verify fixes + sync docs (parallel)
# ═══════════════════════════════════════════════════════════════════════════════

  re-test:
    name: "re-test"
    runs-on: ubuntu-latest
    needs: fix-agent
    if: github.event_name == 'pull_request'
    env:
      DATABASE_URL: sqlite:///./test.db
      GOOGLE_CLIENT_ID: test-client-id
      FINNHUB_API_KEY: test-key
      JOB_SECRET: test-job-secret
      ADMIN_SECRET: test-admin-secret
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run verification agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            Verify that fixes resolved all bugs from reports/qa-report.md.

            Step 1:
            `cd backend && ANTHROPIC_API_KEY=test-key pytest tests/ -v --tb=short 2>&1 | tail -50`
            `npx jest --ci --no-coverage 2>&1 | tail -20`

            Step 2: Append to reports/qa-report.md:
            ## Verification
            - Total passing / failing after fixes
            - For each original bug: ✅ resolved or ❌ still failing

            Step 3:
            ```
            git add reports/qa-report.md
            git commit -m "ci: verification after fixes"
            ```
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report-final
          path: reports/qa-report.md
          retention-days: 5
          if-no-files-found: ignore

  docs-agent:
    name: "docs-agent"
    runs-on: ubuntu-latest
    needs: [check-bugs, fix-agent]
    if: always() && needs.check-bugs.result == 'success' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Run docs agent
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          direct_prompt: |
            You are a Technical Writer. Update docs to reflect this PR's changes.

            Step 1: `git diff ${{ env.BASE_REF }}..HEAD --stat` and `git log ${{ env.BASE_REF }}..HEAD --oneline`.
            Read each changed source file.

            Step 2: If data pipeline files changed (agents/, models.py, schemas.py):
            update Docs/DATA_SOURCES.md or Docs/YFINANCE_FIELD_AUDIT.md as needed.

            Step 3: Update CHANGELOG.md — rewrite ONLY the `## [Unreleased]` section:
            - Groups: Added / Changed / Fixed / Removed
            - One bullet per logical change, plain English, no commit hashes
            - Do NOT touch versioned sections

            Step 4:
            ```
            git add CHANGELOG.md Docs/
            git commit -m "docs: sync for ${{ env.HEAD_REF }}"
            ```
            If nothing changed, do not commit.

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 6 — PR comment
# ═══════════════════════════════════════════════════════════════════════════════

  summary:
    name: "summary"
    runs-on: ubuntu-latest
    needs: [docs-agent, re-test]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Download qa-report-final
        id: dl-final
        uses: actions/download-artifact@v4
        with:
          name: qa-report-final
          path: reports/
        continue-on-error: true
      - name: Download qa-report (fallback)
        if: steps.dl-final.outcome != 'success'
        uses: actions/download-artifact@v4
        with:
          name: qa-report
          path: reports/
        continue-on-error: true
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '_QA report not generated._';
            try {
              const raw = fs.readFileSync('reports/qa-report.md', 'utf8');
              report = raw.length > 3000 ? raw.slice(0, 3000) + '\n\n…_(truncated — see artifact)_' : raw;
            } catch {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: ['## Agent QA Pipeline Results', '', '<details><summary>QA Report</summary>', '', report, '', '</details>'].join('\n'),
            });
